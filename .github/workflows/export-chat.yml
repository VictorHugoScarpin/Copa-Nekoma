name: Export Chat (só exporta, não apaga)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install @supabase/supabase-js ws date-fns

      - name: Exportar histórico do chat
        run: node --experimental-vm-modules scripts/export-chat.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Salvar histórico como artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-export-${{ github.run_number }}
          path: chat-export.html
          retention-days: 90
