name: Reset Password

on:
  workflow_dispatch:
    inputs:
      user_email:
        description: 'Email do usuário (ex: liliu@bolao.copa)'
        required: true
      nova_senha:
        description: 'Nova senha temporária'
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install @supabase/supabase-js ws

      - name: Resetar senha
        run: node --experimental-vm-modules scripts/reset-password.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          USER_EMAIL: ${{ github.event.inputs.user_email }}
          NOVA_SENHA: ${{ github.event.inputs.nova_senha }}
